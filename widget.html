<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rings</title>
<style>
  :root {
    --green:  #2ADE80;
    --orange: #F07830;
    --blue:   #5BABFF;
    --bg:     #141418;
    --s1:     #1E1E28;
    --s2:     #2A2A36;
    --bd:     #3A3A4E;
    --t1:     #F0F0F6;
    --t2:     #9898AA;
    --t3:     #606072;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    font-family: -apple-system, 'Segoe UI', sans-serif;
  }

  .card {
    width: 100%; height: 100%;
    background: var(--bg);
    border: 1px solid var(--bd);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 16px 18px;
    -webkit-app-region: drag;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  /* top drag handle bar */
  .drag-bar {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 32px; height: 3px;
    background: var(--bd);
    border-radius: 2px;
  }

  .rings-wrap {
    position: relative;
    width: 130px; height: 130px;
    flex-shrink: 0;
  }
  .rings-wrap svg { transform: rotate(-90deg); display: block; }
  .ring-anim { transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1); }

  .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score {
    font-family: 'Consolas', monospace;
    font-size: 28px; font-weight: 600;
    letter-spacing: -1.5px; color: var(--t1); line-height: 1;
  }
  .score-label {
    font-size: 8px; color: var(--t3);
    letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px;
  }

  /* legend rows */
  .legend { width: 100%; display: flex; flex-direction: column; gap: 7px; }
  .leg-row { display: flex; align-items: center; gap: 7px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .leg-label { font-size: 10px; color: var(--t3); flex: 1; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .leg-val { font-family: 'Consolas', monospace; font-size: 11px; color: var(--t2); }
  .leg-track { position: relative; height: 2px; background: var(--s2); border-radius: 2px; overflow: hidden; flex: 1; }
  .leg-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 2px; transition: width 0.8s ease; }

  .stale { opacity: 0.35; }

  /* no-drag on interactive elements */
  a, button { -webkit-app-region: no-drag; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="drag-bar"></div>

    <div class="rings-wrap">
      <svg width="130" height="130" viewBox="0 0 130 130" fill="none">
        <circle cx="65" cy="65" r="56" stroke="#2A2A36" stroke-width="9"/>
        <circle cx="65" cy="65" r="42" stroke="#2A2A36" stroke-width="9"/>
        <circle cx="65" cy="65" r="28" stroke="#2A2A36" stroke-width="9"/>
        <circle class="ring-anim" id="ringCalories" cx="65" cy="65" r="56"
          stroke="var(--orange)" stroke-width="9"
          stroke-dasharray="352" stroke-dashoffset="352" stroke-linecap="round"/>
        <circle class="ring-anim" id="ringProtein" cx="65" cy="65" r="42"
          stroke="var(--blue)" stroke-width="9"
          stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round"/>
        <circle class="ring-anim" id="ringTasks" cx="65" cy="65" r="28"
          stroke="var(--green)" stroke-width="9"
          stroke-dasharray="176" stroke-dashoffset="176" stroke-linecap="round"/>
      </svg>
      <div class="center">
        <div class="score" id="score">--</div>
        <div class="score-label">Score</div>
      </div>
    </div>

    <div class="legend">
      <div class="leg-row">
        <div class="dot" style="background:var(--orange)"></div>
        <div class="leg-label">Cal</div>
        <div class="leg-track"><div class="leg-fill" id="calBar" style="width:0%;background:var(--orange)"></div></div>
        <div class="leg-val" id="calPct">--%</div>
      </div>
      <div class="leg-row">
        <div class="dot" style="background:var(--blue)"></div>
        <div class="leg-label">Pro</div>
        <div class="leg-track"><div class="leg-fill" id="proBar" style="width:0%;background:var(--blue)"></div></div>
        <div class="leg-val" id="proPct">--%</div>
      </div>
      <div class="leg-row">
        <div class="dot" style="background:var(--green)"></div>
        <div class="leg-label">Tasks</div>
        <div class="leg-track"><div class="leg-fill" id="taskBar" style="width:0%;background:var(--green)"></div></div>
        <div class="leg-val" id="taskPct">--%</div>
      </div>
    </div>
  </div>

<script>
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  async function api(path) {
    const res = await fetch(path, { credentials: 'include' });
    if (!res.ok) throw new Error('failed');
    return res.json();
  }
  function setRing(id, c, pct) {
    const el = document.getElementById(id); if (!el) return;
    el.setAttribute('stroke-dashoffset', Math.max(0, Math.round(c * (1 - Math.min(Math.max(pct,0),100)/100))));
  }

  async function refresh() {
    try {
      const [rings, meals, settings, goals] = await Promise.all([
        api('/api/rings/today'), api('/api/meals?date='+todayStr()),
        api('/api/goals'),       api('/api/goal-tracker'),
      ]);
      const cg = parseInt(settings.calorie_goal||'2200'), pg = rings.protein_goal||parseInt(settings.protein_goal||'130');
      const cal = meals.reduce((s,m)=>s+(m.calories||0),0), pro = rings.protein_intake||0;
      const daily = goals.filter(g=>g.period==='daily'), done = daily.filter(g=>g.completed).length, total = daily.length;
      const cp = cg ? Math.min(100,Math.round(cal/cg*100)) : 0;
      const pp = pg ? Math.min(100,Math.round(pro/pg*100)) : 0;
      const tp = total ? Math.round(done/total*100) : 0;

      setRing('ringCalories',352,cp); setRing('ringProtein',264,pp); setRing('ringTasks',176,tp);
      document.getElementById('calPct').textContent  = cp+'%';
      document.getElementById('proPct').textContent  = pp+'%';
      document.getElementById('taskPct').textContent = tp+'%';
      document.getElementById('calBar').style.width  = cp+'%';
      document.getElementById('proBar').style.width  = pp+'%';
      document.getElementById('taskBar').style.width = tp+'%';
      document.getElementById('score').textContent   = (Math.round(((cp+pp+tp)/3)/10*10)/10).toFixed(1);
      document.getElementById('card').classList.remove('stale');
    } catch(e) {
      document.getElementById('card').classList.add('stale');
    }
  }

  function connectWS() {
    try {
      const ws = new WebSocket((location.protocol==='https:'?'wss:':'ws:')+`//${location.host}`);
      ws.onmessage = ev => {
        let msg; try { msg=JSON.parse(ev.data); } catch(e) { return; }
        if (['rings_updated','goals_updated','goal_tracker_updated','meals_updated','habits_updated'].includes(msg.type)) refresh();
      };
      ws.onclose = () => setTimeout(connectWS, 3000);
      ws.onerror = () => ws.close();
    } catch(e) { setTimeout(connectWS, 3000); }
  }

  refresh();
  setInterval(refresh, 60000);
  connectWS();
</script>
</body>
</html>
